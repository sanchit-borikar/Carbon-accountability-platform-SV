    container_name: vayudrishti-demo-iot
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vayu_drishti
      DB_USER: postgres
      DB_PASSWORD: vayu2026
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:

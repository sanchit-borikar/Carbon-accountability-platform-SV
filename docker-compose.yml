    container_name: vayudrishti-demo-nasa
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vayu_drishti
      DB_USER: postgres
      DB_PASSWORD: vayu2026
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./demo_nasa.py:/app/demo_nasa.py
      - ./demo_cities.py:/app/demo_cities.py
      - ./data_ingestion:/app/data_ingestion

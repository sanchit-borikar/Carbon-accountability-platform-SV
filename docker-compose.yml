        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./demo_iot.py:/app/demo_iot.py
      - ./demo_cities.py:/app/demo_cities.py
      - ./data_ingestion:/app/data_ingestion
      - ./vayu_logger.py:/app/vayu_logger.py
    command: ["python", "-u", "demo_iot.py"]
    restart: unless-stopped

  demo-nasa:
    build:
      context: .

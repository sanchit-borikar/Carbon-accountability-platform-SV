  demo-satellite:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vayudrishti-demo-satellite
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vayu_drishti
